<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Publicación | Defensa Penal Técnica</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0a0a0a",
            secondary: "#856404",
            surface: "#fcf9f8",
          },
          fontFamily: {
            headline: ["Noto Serif"],
            body: ["Work Sans"],
          }
        }
      }
    }
  </script>
</head>

<body class="bg-surface font-body text-neutral-900 overflow-x-hidden">

  <nav class="w-full bg-white/90 backdrop-blur-md border-b border-neutral-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
      <a href="/index.html" class="font-bold tracking-widest uppercase text-sm hover:text-secondary transition-all">
        Volver al inicio
      </a>
      <a href="/index.html#blog" class="font-bold tracking-widest uppercase text-sm hover:text-secondary transition-all">
        Blog
      </a>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-6 py-16">

    <div id="post-loading" class="text-center text-neutral-600 text-lg">
      Cargando publicación...
    </div>

    <article id="post-content" class="hidden">
      <h1 id="post-title" class="font-headline text-5xl font-bold mb-6 text-primary"></h1>

      <p id="post-description" class="text-neutral-700 text-lg mb-10 leading-relaxed"></p>

      <img id="post-image" class="hidden w-full h-96 object-cover mb-10 shadow-xl border-t-8 border-secondary" />

      <div id="post-body" class="text-neutral-800 leading-relaxed text-base space-y-4"></div>

      <div class="mt-14 flex flex-col md:flex-row gap-4">
        <a href="/index.html" class="bg-primary text-white px-8 py-4 font-bold uppercase tracking-widest hover:bg-secondary transition-all text-center">
          Volver
        </a>

        <button onclick="copyLink()" class="border-2 border-primary px-8 py-4 font-bold uppercase tracking-widest hover:bg-primary hover:text-white transition-all">
          Copiar Link
        </button>
      </div>
    </article>

    <div id="post-error" class="hidden text-center text-red-600 text-lg font-bold">
      Publicación no encontrada.
    </div>

  </main>

  <script>
    function getSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get("slug");
    }

    function markdownToHtml(md) {
      if (!md) return "";

      return md
        .replace(/^### (.*$)/gim, "<h3 class='font-headline text-2xl font-bold mt-8 mb-3'>$1</h3>")
        .replace(/^## (.*$)/gim, "<h2 class='font-headline text-3xl font-bold mt-10 mb-4'>$1</h2>")
        .replace(/^# (.*$)/gim, "<h1 class='font-headline text-4xl font-bold mt-10 mb-4'>$1</h1>")
        .replace(/\*\*(.*)\*\*/gim, "<strong>$1</strong>")
        .replace(/\*(.*)\*/gim, "<em>$1</em>")
        .replace(/\n/gim, "<br>");
    }

    async function loadPost() {
      const slug = getSlug();

      if (!slug) {
        document.getElementById("post-loading").classList.add("hidden");
        document.getElementById("post-error").classList.remove("hidden");
        return;
      }

      try {
        const res = await fetch("/content/blog/posts.json");
        const posts = await res.json();

        const post = posts.find(p => p.slug === slug);

        document.getElementById("post-loading").classList.add("hidden");

        if (!post) {
          document.getElementById("post-error").classList.remove("hidden");
          return;
        }

        document.title = post.title + " | Defensa Penal Técnica";

        document.getElementById("post-title").textContent = post.title;
        document.getElementById("post-description").textContent = post.description;

        if (post.image) {
          const img = document.getElementById("post-image");
          img.src = post.image;
          img.classList.remove("hidden");
        }

        document.getElementById("post-body").innerHTML = markdownToHtml(post.content);

        document.getElementById("post-content").classList.remove("hidden");
      } catch (err) {
        console.error(err);
        document.getElementById("post-loading").classList.add("hidden");
        document.getElementById("post-error").classList.remove("hidden");
      }
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href);
      alert("Link copiado correctamente.");
    }

    loadPost();
  </script>

</body>
</html>
